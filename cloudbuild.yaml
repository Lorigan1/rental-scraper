# Cloud Build config for CI/CD
# Triggers on push to main: builds image, pushes to Artifact Registry,
# updates the Cloud Run job.
#
# Setup:
#   gcloud builds triggers create github \
#     --repo-name=rental-scraper \
#     --repo-owner=YOUR_GITHUB_USERNAME \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#     --project=${GCP_PROJECT}

substitutions:
  _REGION: us-west1
  _AR_REPO: rental-scraper
  _JOB_NAME: rental-scraper-job
  _TAG: latest

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/rental-scraper:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/rental-scraper:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/rental-scraper'

  # Update Cloud Run job with new image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - '${_JOB_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/rental-scraper:${_TAG}'
      - '--region=${_REGION}'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/rental-scraper:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/rental-scraper:latest'

options:
  logging: CLOUD_LOGGING_ONLY
